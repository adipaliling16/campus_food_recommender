name: campus_food_recommender

description: Aplikasi rekomendasi tempat makan dan cafe di sekitar kampus berbasis lokasi, rating, dan ulasan pengguna.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.10.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.0.2

  # Google Sign In
  google_sign_in: ^7.1.1

  # Maps
  google_maps_flutter: ^2.17.0

  # GPS & Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Upload Gambar
  image_picker: ^1.1.2

  # HTTP Request
  http: ^1.2.1

  # Open Maps / URL
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true